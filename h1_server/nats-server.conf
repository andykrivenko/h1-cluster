# NATS Server Configuration — H1 Heavy Server
# Documentation: https://docs.nats.io/running-a-nats-service/configuration

# Listen on all interfaces, port 4222
host: 0.0.0.0
port: 4222

# HTTP monitoring port
http_port: 8222

# Authentication — use a strong random token in production
authorization {
  token: "YOUR_SECRET_TOKEN_HERE"
}

# Connection limits
max_connections: 100
max_payload: 1MB

# Logging
log_file: "C:\\H1_Server\\logs\\nats.log"
logtime: true
debug: false
trace: false

# Ping settings
ping_interval: "2m"
ping_max: 2
